  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Geist:wght@300..900&family=Geist+Mono:wght@400..600&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       HOME 3 — Light, "Documents in motion"
       Warm light gray surface; floating doc-rectangles; gradient
       orbs; hairline scaffolding.
       ============================================================ */
    :root {
      --bg:        #f2f1f0;   /* very light neutral gray */
      --bg-2:      #f5f4f3;
      --bg-3:      #e8e7e6;
      --surface:   #FFFFFF;
      --ink:       #0e121c;
      --ink-2:     #3a3e4a;
      --ink-3:     #6a6e7a;
      --ink-4:     #a0a4ae;
      --line:      rgba(14, 18, 28,0.10);
      --line-2:    rgba(14, 18, 28,0.18);
      --line-soft: rgba(14, 18, 28,0.05);
      --dot:       rgba(14, 18, 28,0.22);

      /* Light-on-paper panel tokens — value range collapsed to ~3%,
         tuned to a very light neutral gray bg. */
      --panel-lit:  #fafaf9;
      --panel-edge: rgba(254, 253, 252, 0.5);
      --pentecon-navy:  #203263;
      --pentecon-blue:  #2f4d9e;
      --pentecon-aqua:  #789fa1;  /* minimal use only */
      --pentecon-gold:  #e6c999;  /* minimal use only */
      --pentecon-white: #fef9fb;

      /* Orb hues — locked to new palette */
      --orb-h1:    225; /* primary blue */
      --orb-h2:    223; /* deep navy */
      --orb-h3:    184; /* teal (minimal) */

      --fs-mono: 13px;
      --fs-body: 16px;
      --fs-h3:   22px;
      --fs-h2:   clamp(30px, 2.8vw, 44px);
      --fs-h1:   clamp(40px, 4.4vw, 72px);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); }
    body {
      color: var(--ink);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: var(--fs-body);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; }
    ul, ol { list-style: square; }
    ul li::marker, ol li::marker { color: currentColor; }

    .mono {
      font-family: 'IBM Plex Mono', 'SF Mono', Menlo, monospace;
      font-size: var(--fs-mono);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 400;
      color: var(--ink-3);
    }

    .container {
      width: 100%;
      max-width: 1640px;
      margin: 0 auto;
      padding: 0 56px;
    }
    @media (max-width: 720px) { .container { padding: 0 20px; } }

    .mixed-weight { font-weight: 300; letter-spacing: -0.025em; }
    .mixed-weight em { font-style: normal; font-weight: 600; }

    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 11px 18px;
      background: var(--pentecon-navy);
      color: #fff;
      border: 1px solid var(--pentecon-navy);
      border-radius: 6px;
      font-size: 15px; font-weight: 500;
      transition: background 160ms ease, transform 160ms ease, box-shadow 200ms ease;
    }
    .btn:hover { background: #2a3a78; border-color: #2a3a78; box-shadow: 0 8px 24px rgba(32, 50, 99,0.22); }
    .btn-ghost {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line-2);
    }
    .btn-ghost:hover { background: rgba(32, 50, 99,0.05); box-shadow: none; border-color: rgba(32, 50, 99,0.32); }

    .announce-light {
      position: fixed; top: 0; left: 0; right: 0; z-index: 60;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
      text-align: center;
      padding: 9px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: var(--fs-mono);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-2);
    }
    .announce-light strong { color: var(--ink); font-weight: 500; }
    .announce-light a { color: var(--pentecon-blue); margin-left: 10px; text-decoration: underline; text-decoration-color: rgba(47, 77, 158,0.4); text-underline-offset: 3px; }

    .site-header-3 {
      position: fixed; top: 36px; left: 0; right: 0; z-index: 50;
      background: rgba(242, 241, 240, 0.78);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid var(--line);
    }
    .site-header-3-inner {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; height: 84px;
    }
    .site-header-3 .nav-center { display: flex; gap: 30px; }
    .site-header-3 .nav-center a {
      font-size: 15px; color: var(--ink-2);
      transition: color 160ms ease;
    }
    .site-header-3 .nav-center a:hover { color: var(--ink); }
    .site-header-3 .nav-right { justify-self: end; }
    @media (max-width: 880px) { .site-header-3 .nav-center { display: none; } }

    main { padding-top: 120px; }

    :focus-visible { outline: 2px solid var(--pentecon-blue); outline-offset: 2px; }

    section { position: relative; }
    .sec-pad { padding: 120px 0; }

    .hairline-divider {
      height: 1px;
      background: var(--line);
      width: 100%;
    }

    .doc-rect {
      position: absolute;
      background:
        linear-gradient(
          var(--lit-angle, 135deg),
          var(--panel-lit) 0%,
          var(--panel-edge) 38%,
          rgba(250, 250, 249, 0.0) 78%
        );
      border-radius: 2px;
      box-shadow:
        inset 1px 0 0 rgba(255, 255, 255, var(--edge-strength, 0.5)),
        inset 0 1px 0 rgba(255, 255, 255, var(--edge-strength, 0.5));
      opacity: 0;
      transform: translate(var(--from-x, 0), var(--from-y, 0)) scale(0.96);
      animation: doc-drift-in 1400ms cubic-bezier(.2,.7,.2,1) forwards;
      animation-delay: var(--delay, 0ms);
      mix-blend-mode: normal;
    }
    .doc-rect[data-lit="tr"] {
      box-shadow:
        inset -1px 0 0 rgba(255, 255, 255, var(--edge-strength, 0.5)),
        inset 0 1px 0 rgba(255, 255, 255, var(--edge-strength, 0.5));
    }
    .doc-rect[data-lit="bl"] {
      box-shadow:
        inset 1px 0 0 rgba(255, 255, 255, var(--edge-strength, 0.5)),
        inset 0 -1px 0 rgba(255, 255, 255, var(--edge-strength, 0.5));
    }
    .doc-rect[data-lit="br"] {
      box-shadow:
        inset -1px 0 0 rgba(255, 255, 255, var(--edge-strength, 0.5)),
        inset 0 -1px 0 rgba(255, 255, 255, var(--edge-strength, 0.5));
    }
    @keyframes doc-drift-in {
      0%   { opacity: 0; transform: translate(var(--from-x, 0), var(--from-y, 0)) scale(0.94); }
      60%  { opacity: 1; }
      100% { opacity: 1; transform: translate(0,0) scale(1); }
    }

    .doc-rect.floats {
      animation: doc-drift-in 1100ms cubic-bezier(.2,.7,.2,1) forwards var(--delay, 0ms),
                 doc-float 9s ease-in-out infinite calc(var(--delay, 0ms) + 1200ms);
    }
    @keyframes doc-float {
      0%, 100% { transform: translate(0, 0); }
      50%      { transform: translate(var(--float-x, 0), var(--float-y, -4px)); }
    }

    .orb {
      position: relative;
      border-radius: 50%;
      filter: blur(0.2px);
      background:
        radial-gradient(circle at 30% 30%, hsl(var(--orb-h1) 70% 68% / 0.92) 0%, hsl(var(--orb-h1) 60% 50% / 0.82) 30%, transparent 60%),
        radial-gradient(circle at 75% 60%, hsl(var(--orb-h3) 55% 58% / 0.62) 0%, transparent 50%),
        radial-gradient(circle at 60% 80%, hsl(var(--orb-h2) 50% 22% / 0.88) 0%, transparent 55%),
        radial-gradient(circle at 50% 50%, hsl(var(--orb-h1) 55% 38% / 1) 0%, hsl(var(--orb-h1) 60% 18% / 1) 90%);
      box-shadow:
        0 30px 80px -30px hsl(var(--orb-h1) 50% 40% / 0.4),
        inset 0 0 80px hsl(var(--orb-h1) 60% 40% / 0.22);
      animation: orb-spin 18s ease-in-out infinite alternate;
    }
    .orb.aqua {
      background:
        radial-gradient(circle at 35% 35%, hsl(195 55% 65% / 0.88) 0%, hsl(195 50% 48% / 0.78) 28%, transparent 60%),
        radial-gradient(circle at 70% 70%, hsl(215 55% 50% / 0.55) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, hsl(200 50% 32% / 1) 0%, hsl(210 55% 16% / 1) 95%);
      box-shadow:
        0 30px 80px -30px hsl(200 50% 40% / 0.4),
        inset 0 0 80px hsl(200 50% 40% / 0.2);
    }
    @keyframes orb-spin {
      0%   { transform: rotate(0deg) scale(1); }
      100% { transform: rotate(20deg) scale(1.04); }
    }

    .bloom {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.55;
      pointer-events: none;
    }

    .frosted {
      background: linear-gradient(135deg, rgba(255,255,255,0.66), rgba(255,255,255,0.38));
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.58);
      box-shadow:
        0 24px 50px -28px rgba(32, 50, 99,0.22),
        0 1px 0 rgba(255,255,255,0.72) inset;
      border-radius: 14px;
    }

    .draw-line {
      stroke-dasharray: var(--dash-len, 1000);
      stroke-dashoffset: var(--dash-len, 1000);
      transition: stroke-dashoffset 1600ms cubic-bezier(.2,.7,.2,1);
    }
    .draw-line.in-view { stroke-dashoffset: 0; }

    .news-row {
      display: grid;
      grid-template-columns: 200px 1fr auto;
      gap: 40px;
      padding: 28px 0;
      border-top: 1px solid var(--line);
      align-items: baseline;
      transition: padding 200ms ease, background 200ms ease;
      cursor: pointer;
    }
    .news-row:last-child { border-bottom: 1px solid var(--line); }
    .news-row:hover { padding-left: 12px; }
    @media (max-width: 720px) {
      .news-row { grid-template-columns: 1fr; gap: 4px; }
    }

    .fade-up { opacity: 0; transform: translateY(18px); transition: opacity 800ms ease, transform 800ms cubic-bezier(.2,.7,.2,1); }
    .fade-up.in-view { opacity: 1; transform: translateY(0); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
      .fade-up { opacity: 1; transform: none; }
    }
  </style>

  <style>

      --bg:        #0e1014;
      --bg-2:      #14161b;
      --bg-3:      #1a1d22;

    .doc-rect {

      box-shadow: none;
    }
    body[data-variant="dark"] .doc-rect,
    body[data-variant="dark"] .doc-rect[data-lit="tr"],
    body[data-variant="dark"] .doc-rect[data-lit="bl"],
    body[data-variant="dark"] .doc-rect[data-lit="br"] {

    }

    .announce-light {

    }
    .site-header-3 {
      background: rgba(14, 16, 20, 0.78);
      border-bottom: none;
    }
    .site-header-3 .nav-center a { color: var(--ink-2); }
    .site-header-3 .nav-center a:hover { color: var(--ink); }

    body[data-variant="dark"] img[src*="pentecon-logo-home3"] {
      filter: brightness(0) invert(1);
      opacity: 0.94;
    }

    .btn { background: var(--pentecon-navy); border-color: var(--pentecon-navy); color: #fff; }
    .btn:hover { background: #4a6cce; border-color: #4a6cce; box-shadow: 0 8px 24px rgba(61, 92, 184, 0.30); }
    .btn-ghost {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line-2);
    }
    .btn-ghost:hover { background: rgba(125, 154, 239, 0.08); border-color: rgba(125, 154, 239, 0.40); }

    .frosted {
      background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow:
        0 24px 60px -28px rgba(0, 0, 0, 0.55),
        0 1px 0 rgba(255,255,255,0.06) inset;
    }

    body[data-variant="dark"] #proof svg path[fill="#0e121c"] { fill: var(--ink); }

    body[data-variant="dark"] #process article {
      background: var(--surface) !important;
      border-color: var(--line) !important;
      box-shadow: 0 24px 48px -32px rgba(0, 0, 0, 0.6) !important;
    }

    body[data-variant="dark"] .news-row:hover { background: rgba(255,255,255,0.02); }

    body[data-variant="dark"] #contact .bloom { display: none !important; }

    body[data-variant="dark"] #hero > div[aria-hidden="true"] > .doc-rect:nth-child(1),
    body[data-variant="dark"] #hero > div[aria-hidden="true"] > .doc-rect:nth-child(2),
    body[data-variant="dark"] #hero > div[aria-hidden="true"] > .doc-rect:nth-child(3),
    body[data-variant="dark"] #hero > div[aria-hidden="true"] > .doc-rect:nth-child(8) {
      opacity: 0.35 !important;
    }

    body[data-variant="dark"] ::selection { background: rgba(125, 154, 239, 0.30); color: #fff; }
    body[data-variant="dark"] :focus-visible { outline-color: var(--pentecon-blue); }

    @keyframes doc-drift-in {
      0%   { opacity: 0; transform: translate(var(--from-x, 0), var(--from-y, 0)) skewX(-12deg) scale(0.94); }
      60%  { opacity: 1; }
      100% { opacity: 1; transform: translate(0, 0) skewX(-12deg) scale(1); }
    }
    @keyframes doc-float {
      0%, 100% { transform: skewX(-12deg) translate(0, 0); }
      50%      { transform: skewX(-12deg) translate(var(--float-x, 0), var(--float-y, -4px)); }
    }

    body {
      font-family: 'Geist', 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-feature-settings: "ss01" on, "cv11" on;
    }
    .mono {
      font-family: 'Geist Mono', 'IBM Plex Mono', 'SF Mono', Menlo, monospace;
      letter-spacing: 0.16em;
    }
    .mixed-weight { letter-spacing: -0.028em; }
    .mixed-weight em { font-weight: 600; }
    p { font-feature-settings: "ss01" on; }
    .hero-stats-3 > div > div:first-child,
    .proof-stats-3 > div > div:first-child {
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.025em;
    }
  </style>
